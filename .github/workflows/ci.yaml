name: Continous Integration

on:
  push:
    branches:
      - main

jobs:
  versioning:
    uses: laboratorio-net/actions/.github/workflows/git-version.yaml@master

  build:
    uses: laboratorio-net/actions/.github/workflows/build-dotnet.yaml@master
    needs: Versioning
    with:
      solution-name: TestPipeLineNet.sln
      package-version: ${{needs.versioning.outputs.version}}
    secrets:
      sonar-token: ${{ secrets.SONAR_TOKEN }}  

  tag:
    uses: laboratorio-net/actions/.github/workflows/create-tag.yaml@master
    needs: [versioning, build]
    with:
      version: ${{needs.versioning.outputs.version}}